name: test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  pytest:
    name: pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install phase-loop-runtime + pytest
        # No test extra is defined in pyproject; install the package + pytest.
        run: python -m pip install ./phase-loop-runtime pytest

      - name: Run standalone test suite
        # conftest.py lives under phase-loop-runtime/tests and skips
        # dotfiles_integration-marked tests when no fleet tree is present.
        working-directory: phase-loop-runtime
        run: python -m pytest -m "not dotfiles_integration"

  cleanroom:
    name: clean-room wheel smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Gate-A clean-room wheel install + CLI smoke
        # Reuses the maintained harness: builds a wheel, installs it into an
        # isolated venv with no dotfiles checkout, and smoke-tests the CLI,
        # asserting no dotfiles paths leak into the resolved runtime.
        run: bash phase-loop-runtime/scripts/gate_a_cleanroom.sh
